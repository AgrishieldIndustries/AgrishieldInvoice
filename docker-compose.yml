version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: agrishield_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agrishield
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: agrishield_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agrishield
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/agrishield
      - SECRET_KEY=super-secret-key-change-in-production
    depends_on:
      - db

volumes:
  pgdata:
